---
# External Secrets Operator — AWS Secrets Manager alternative to Vault
# ESO syncs ASM secrets into Kubernetes Secret objects on a configurable interval.
# Use with Secrets Store CSI Driver to mount directly as files (avoids K8s Secret exposure).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    # IRSA: ESO assumes this IAM role to call AWS Secrets Manager
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/chakra-external-secrets-reader"
---
# ClusterSecretStore: shared across all namespaces; namespace-specific stores can override.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Example ExternalSecret for the orders service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orders-db-credentials
  namespace: orders
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: orders-db-credentials
    creationPolicy: Owner
    # Annotate the resulting K8s Secret with immutable: true to prevent accidental modification
    template:
      type: Opaque
      metadata:
        annotations:
          managed-by: external-secrets-operator
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /chakra/production/orders/db-password
        version: AWSCURRENT
    - secretKey: DB_HOST
      remoteRef:
        key: /chakra/production/orders/db-host
    - secretKey: DB_PORT
      remoteRef:
        key: /chakra/production/orders/db-port
