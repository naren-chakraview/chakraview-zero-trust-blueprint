---
# Vault Server — StatefulSet with AWS KMS auto-unseal
# Vault acts as: secrets store + PKI intermediate CA for app-level TLS
# (distinct from SPIRE, which handles workload identity certificates)
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    ui = true

    storage "raft" {
      path = "/vault/data"
      node_id = "vault-0"
    }

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = false
      tls_cert_file = "/vault/tls/tls.crt"
      tls_key_file  = "/vault/tls/tls.key"
    }

    # AWS KMS auto-unseal — no operator intervention on restart
    seal "awskms" {
      region     = "us-east-1"
      kms_key_id = "alias/chakra-vault-unseal"
    }

    api_addr = "https://vault.vault.svc.cluster.local:8200"
    cluster_addr = "https://vault-0.vault-internal.vault.svc.cluster.local:8201"

    telemetry {
      prometheus_retention_time = "30s"
      disable_hostname = true
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1   # Increase to 3 for HA raft
  serviceName: vault-internal
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
      annotations:
        # IRSA: Vault pod assumes the vault-kms-unseal IAM role for KMS access
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/chakra-vault-kms-unseal"
    spec:
      serviceAccountName: vault
      volumes:
        - name: vault-config
          configMap:
            name: vault-config
        - name: vault-tls
          secret:
            secretName: vault-tls-certs
      containers:
        - name: vault
          image: hashicorp/vault:1.16.1
          args: ["server", "-config=/vault/config/vault.hcl"]
          ports:
            - name: api
              containerPort: 8200
            - name: cluster
              containerPort: 8201
            - name: metrics
              containerPort: 8202
          env:
            - name: VAULT_ADDR
              value: "https://127.0.0.1:8200"
            - name: VAULT_CLUSTER_ADDR
              value: "https://$(POD_IP):8201"
            - name: VAULT_RAFT_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: api
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - vault operator init -key-shares=1 -key-threshold=1 2>/dev/null || true
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
              readOnly: true
            - name: vault-tls
              mountPath: /vault/tls
              readOnly: true
            - name: vault-data
              mountPath: /vault/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: ["IPC_LOCK"]   # Required by Vault to prevent memory swapping of secrets
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  selector:
    app: vault
  ports:
    - name: api
      port: 8200
      targetPort: 8200
    - name: metrics
      port: 8202
      targetPort: 8202
  type: ClusterIP
