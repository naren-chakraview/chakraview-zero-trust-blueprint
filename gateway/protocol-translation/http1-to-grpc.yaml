---
# Protocol translation: HTTP/1.1 caller → gRPC upstream
# Use case: legacy client sends HTTP/1.1 POST; upstream service speaks gRPC.
# Envoy's grpc_http1_bridge filter bridges the two without changing the upstream.
#
# The caller sends:
#   POST /chakra.orders.v1.OrderService/PlaceOrder HTTP/1.1
#   Content-Type: application/grpc
#   (with framed protobuf body)
#
# Envoy upgrades the connection to HTTP/2 toward the upstream gRPC service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: zt-gateway-http1-to-grpc
  namespace: zt-gateway
data:
  filter-chain-snippet.yaml: |
    # Add this filter BEFORE the router filter in the HTTP connection manager.
    # The filter transparently maps HTTP/1.1 grpc content-type frames to HTTP/2 streams.
    http_filters:
      - name: envoy.filters.http.ext_authz
        # OBO validation — same as all ZT gateway filter chains
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
          grpc_service:
            envoy_grpc:
              cluster_name: opa_authz
            timeout: 0.250s
          transport_api_version: V3
          failure_mode_allow: false

      - name: envoy.filters.http.grpc_http1_bridge
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_http1_bridge.v3.Config
          upgrade_protobuf_to_grpc: true

      - name: envoy.filters.http.router
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # Upstream cluster must use HTTP/2 (gRPC requires HTTP/2)
    upstream_cluster_snippet: |
      - name: grpc_upstream
        connect_timeout: 5s
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            explicit_http_config:
              http2_protocol_options: {}
        # Upstream uses SPIFFE mTLS — SDS delivers cert from SPIRE agent
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            common_tls_context:
              tls_certificate_sds_secret_configs:
                - name: "spiffe://chakra.internal/ns/zt-gateway/sa/zt-gateway"
                  sds_config:
                    api_config_source:
                      api_type: GRPC
                      grpc_services:
                        - envoy_grpc:
                            cluster_name: spire_agent
              validation_context_sds_secret_config:
                name: "spiffe://chakra.internal"
                sds_config:
                  api_config_source:
                    api_type: GRPC
                    grpc_services:
                      - envoy_grpc:
                          cluster_name: spire_agent
        load_assignment:
          cluster_name: grpc_upstream
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: orders-svc.orders.svc.cluster.local
                        port_value: 9090
