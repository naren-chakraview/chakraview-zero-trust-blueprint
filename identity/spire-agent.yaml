---
# SPIRE Agent — DaemonSet (one per node)
# Delivers SVIDs to workloads via the SPIFFE Workload API unix socket.
# Also populates the SDS endpoint that Envoy (ZT gateway + Istio sidecars) uses
# to receive SVID updates without restarts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire"
      log_level = "INFO"
      log_format = "json"
      trust_domain = "chakra.internal"
      server_address = "spire-server"
      server_port = "8081"

      # Socket path — mounted into every workload pod as a hostPath volume
      socket_path = "/run/spire/sockets/agent.sock"

      health_checks {
        listener_enabled = true
        bind_address = "0.0.0.0"
        bind_port = "8080"
      }
    }

    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "chakra-prod"
          token_path = "/var/run/secrets/tokens/spire-agent"
        }
      }

      KeyManager "memory" {
        plugin_data {}
      }

      WorkloadAttestor "k8s" {
        plugin_data {
          skip_kubelet_verification = false
          node_name_env = "MY_NODE_NAME"
        }
      }
    }

    telemetry {
      Prometheus {
        port = 9988
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app: spire-agent
spec:
  selector:
    matchLabels:
      app: spire-agent
  template:
    metadata:
      labels:
        app: spire-agent
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: spire-agent
      initContainers:
        - name: init-server-wait
          image: cgr.dev/chainguard/wait-for-it:latest
          args: ["spire-server:8081", "--", "echo", "SPIRE server ready"]
      containers:
        - name: spire-agent
          image: ghcr.io/spiffe/spire-agent:1.9.4
          args: ["-config", "/run/spire/config/agent.conf"]
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: health
              containerPort: 8080
              hostPort: 8080
            - name: metrics
              containerPort: 9988
              hostPort: 9988
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 15
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
            - name: spire-token
              mountPath: /var/run/secrets/tokens
            - name: kubelet-certs
              mountPath: /var/lib/kubelet/pki
              readOnly: true
      volumes:
        - name: spire-config
          configMap:
            name: spire-agent-config
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spire-token
          projected:
            sources:
              - serviceAccountToken:
                  path: spire-agent
                  expirationSeconds: 7200
                  audience: spire-server
        - name: kubelet-certs
          hostPath:
            path: /var/lib/kubelet/pki
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire
